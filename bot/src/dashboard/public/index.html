<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moze Bot — Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic Pro", arial, sans-serif;
      background: #1a1a1a;
      color: #eee;
      min-height: 100vh;
    }
    header {
      background: #111;
      border-bottom: 2px solid #C6E607;
      padding: 0.85em 1.5em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 1.3em; font-weight: 900; color: #C6E607; }
    .logo span { color: #888; font-weight: 400; font-size: 0.8em; margin-left: 0.5em; }
    a.logout { color: #888; font-size: 0.85em; text-decoration: none; }
    a.logout:hover { color: #ff5555; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 1.5em 1em; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1em;
      margin-bottom: 1.75em;
    }
    .stat-card {
      background: #111;
      border: 1px solid #333;
      padding: 1em;
      text-align: center;
    }
    .stat-card .val { font-size: 2em; font-weight: 900; color: #C6E607; }
    .stat-card .lbl { font-size: 0.75em; color: #888; margin-top: 0.25em; text-transform: uppercase; letter-spacing: 0.05em; }
    .section {
      background: #111;
      border: 1px solid #333;
      margin-bottom: 1.5em;
    }
    .section-head {
      background: #C6E607;
      color: #1a1a1a;
      font-weight: 800;
      padding: 0.6em 1em;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section-body { padding: 1.25em 1em; }
    label { display: block; font-size: 0.8em; color: #888; margin-bottom: 0.3em; margin-top: 0.85em; text-transform: uppercase; letter-spacing: 0.04em; }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="number"], input[type="password"] {
      width: 100%;
      padding: 0.6em 0.8em;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      font-size: 0.95em;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #C6E607; }
    .btn {
      padding: 0.6em 1.4em;
      background: #C6E607;
      color: #1a1a1a;
      border: none;
      font-weight: 800;
      font-size: 0.9em;
      cursor: pointer;
      font-family: inherit;
      margin-top: 1em;
    }
    .btn:hover { background: #d4ff2a; }
    .btn-danger { background: #ff5555; color: #fff; }
    .btn-danger:hover { background: #ff3333; }
    .btn-sm { padding: 0.35em 0.85em; font-size: 0.8em; margin-top: 0; }
    .toast {
      position: fixed;
      bottom: 1.5em;
      right: 1.5em;
      background: #C6E607;
      color: #1a1a1a;
      padding: 0.7em 1.2em;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      z-index: 99;
    }
    .toast.show { opacity: 1; }
    /* Roles table */
    .roles-table { width: 100%; border-collapse: collapse; margin-bottom: 0.75em; }
    .roles-table th {
      background: #222;
      padding: 0.5em 0.7em;
      text-align: left;
      font-size: 0.78em;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.04em;
    }
    .roles-table td { padding: 0.45em 0.5em; border-bottom: 1px solid #222; }
    .roles-table td input { padding: 0.4em 0.5em; font-size: 0.88em; }
    /* Holders table */
    .holders-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    .holders-table th {
      background: #222;
      padding: 0.5em 0.7em;
      text-align: left;
      font-size: 0.75em;
      text-transform: uppercase;
      color: #888;
    }
    .holders-table td { padding: 0.45em 0.7em; border-bottom: 1px solid #1e1e1e; font-family: monospace; font-size: 0.9em; }
    .holders-table tr:hover td { background: #1a1a1a; }
    .badge {
      display: inline-block;
      padding: 0.15em 0.5em;
      background: #C6E607;
      color: #1a1a1a;
      font-size: 0.75em;
      font-weight: 700;
    }
  </style>
</head>
<body>
<header>
  <div class="logo">Moze Bot <span>Admin Dashboard</span></div>
  <div style="display:flex;gap:1.25em;align-items:center">
    <a href="/raffle-admin.html" style="color:#C6E607;font-size:0.85em;text-decoration:none;font-weight:700">🎟️ Raffle</a>
    <a href="/logout" class="logout">Logout</a>
  </div>
</header>

<div class="wrap">

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="val" id="stat-holders">—</div><div class="lbl">Verified Holders</div></div>
    <div class="stat-card"><div class="val" id="stat-pending">—</div><div class="lbl">Pending Codes</div></div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-head">⚙️ Bot Settings</div>
    <div class="section-body">
      <form id="settings-form">
        <label>Moze Contract Address (CA)</label>
        <input type="text" name="moze_ca" placeholder="0x...">
        <label>Robinhood RPC URL</label>
        <input type="text" name="rh_rpc" placeholder="https://rpc.mainnet.chain.robinhood.com">
        <label>Sales Discord Webhook URL</label>
        <input type="text" name="sales_webhook" placeholder="https://discord.com/api/webhooks/...">
        <label>General Member Role (after CAPTCHA)</label>
        <input type="text" name="member_role" placeholder="Werido">
        <label>Verify Channel ID</label>
        <input type="text" name="verify_channel_id" placeholder="Discord channel ID">
        <button type="submit" class="btn">Save Settings</button>
      </form>
    </div>
  </div>

  <!-- Holder Roles -->
  <div class="section">
    <div class="section-head">🏆 Holder Roles</div>
    <div class="section-body">
      <table class="roles-table" id="roles-table">
        <thead>
          <tr>
            <th>Role Name</th>
            <th>Min Hold</th>
            <th>Max Hold</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="roles-tbody"></tbody>
      </table>
      <button class="btn btn-sm" id="add-role-btn" type="button">+ Add Role</button>
      <button class="btn" id="save-roles-btn" type="button">Save Roles</button>
    </div>
  </div>

  <!-- Verified Holders -->
  <div class="section">
    <div class="section-head">👥 Verified Holders</div>
    <div class="section-body">
      <table class="holders-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Discord ID</th>
            <th>Wallet</th>
            <th>NFTs Held</th>
            <th>Role</th>
            <th>Verified</th>
          </tr>
        </thead>
        <tbody id="holders-tbody">
          <tr><td colspan="6" style="color:#555;padding:1em;text-align:center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const toast = (msg, err) => {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = err ? '#ff5555' : '#C6E607';
    el.style.color = err ? '#fff' : '#1a1a1a';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  };

  // Load stats
  async function loadStats() {
    const data = await fetch('/api/stats').then(r => r.json());
    document.getElementById('stat-holders').textContent = data.verified_holders;
    document.getElementById('stat-pending').textContent = data.pending_codes;
  }

  // Load settings
  async function loadSettings() {
    const data = await fetch('/api/settings').then(r => r.json());
    const form = document.getElementById('settings-form');
    for (const [k, v] of Object.entries(data)) {
      const el = form.elements[k];
      if (el) el.value = v;
    }
  }

  document.getElementById('settings-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    const res = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    toast(data.ok ? '✅ Settings saved!' : '❌ Error saving', !data.ok);
  });

  // Roles
  let rolesData = [];

  async function loadRoles() {
    rolesData = await fetch('/api/roles').then(r => r.json());
    renderRoles();
  }

  function renderRoles() {
    const tbody = document.getElementById('roles-tbody');
    tbody.innerHTML = rolesData.map((r, i) => `
      <tr data-i="${i}">
        <td><input type="text" value="${r.role_name}" class="r-name" style="width:100%"></td>
        <td><input type="number" value="${r.min_hold}" class="r-min" style="width:5em" min="0"></td>
        <td><input type="number" value="${r.max_hold}" class="r-max" style="width:5em" min="0"></td>
        <td><button class="btn btn-sm btn-danger" onclick="removeRole(${i})">✕</button></td>
      </tr>
    `).join('');
  }

  window.removeRole = (i) => {
    rolesData.splice(i, 1);
    renderRoles();
  };

  document.getElementById('add-role-btn').addEventListener('click', () => {
    rolesData.push({ role_name: '', min_hold: 1, max_hold: 999 });
    renderRoles();
    document.getElementById('roles-tbody').lastElementChild.querySelector('.r-name').focus();
  });

  document.getElementById('save-roles-btn').addEventListener('click', async () => {
    // Read current table values
    const rows = document.querySelectorAll('#roles-tbody tr');
    const roles = Array.from(rows).map(row => ({
      role_name: row.querySelector('.r-name').value.trim(),
      min_hold: parseInt(row.querySelector('.r-min').value),
      max_hold: parseInt(row.querySelector('.r-max').value),
    })).filter(r => r.role_name);

    const res = await fetch('/api/roles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roles }),
    });
    const data = await res.json();
    toast(data.ok ? '✅ Roles saved!' : '❌ ' + data.error, !data.ok);
    if (data.ok) { rolesData = roles; }
  });

  // Holders
  async function loadHolders() {
    const holders = await fetch('/api/holders').then(r => r.json());
    const tbody = document.getElementById('holders-tbody');
    if (!holders.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:#555;padding:1em;text-align:center">No verified holders yet.</td></tr>';
      return;
    }
    tbody.innerHTML = holders.map((h, i) => `
      <tr>
        <td style="color:#555">${i + 1}</td>
        <td>${h.discord_id}</td>
        <td>${h.wallet.slice(0,6)}...${h.wallet.slice(-4)}</td>
        <td style="font-weight:700;color:#C6E607">${h.nft_count}</td>
        <td>${h.role ? `<span class="badge">${h.role}</span>` : '<span style="color:#555">—</span>'}</td>
        <td style="color:#555">${new Date(h.verified_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
  }

  // Init
  loadStats();
  loadSettings();
  loadRoles();
  loadHolders();
</script>
</body>
</html>
