server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (basic)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # gzip
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # /stake and other client routes → index
  location / {
    try_files $uri $uri/ /index.html;
  }

  # HTML never long-cached (copy/deploy updates)
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store";
  }

  # JS/CSS short cache so deploys show up without hard-refresh fights
  location ~* \.(css|js)$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
    try_files $uri =404;
  }

  # Long cache for versioned/static media
  location ~* \.(webp|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ~* \.json$ {
    expires 5m;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
